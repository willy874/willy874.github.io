name: Deploy to GitHub Pages

on:
  push:
    # 本 repo 預設分支為 master(規劃書 §8 範例寫 main,此處依實際分支調整)
    branches: [master]
  workflow_dispatch: # 手動觸發(改 giscus 設定等不動內容時用)

concurrency:
  group: pages
  cancel-in-progress: true # 連續 push 只跑最後一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build # astro build && pagefind --site dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
